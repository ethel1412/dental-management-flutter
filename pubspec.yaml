name: scan_my_tooth
description: AI-powered dental X-ray analysis and clinic management
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10

  # State Management
  provider: ^6.1.2
  get: ^4.6.6

  # API & Networking
  http: ^1.2.2
  dio: ^5.7.0

  # Storage
  shared_preferences: ^2.3.3

  # File Handling
  image_picker: ^1.1.2
  file_picker: ^10.3.3
  path_provider: ^2.1.5

  # Date & Time
  intl: ^0.20.2

  # Loading & Dialogs
  flutter_spinkit: ^5.2.1
  fluttertoast: ^9.0.0

  # Forms & Validation
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.0.0

  # Image Display
  cached_network_image: ^3.4.1

  # PDF Viewer (for reports)
  flutter_pdfview: ^1.3.3

  # Permissions
  permission_handler: ^12.0.1

  # Charts & Graphs
  fl_chart: ^1.1.1

  # QR Code (optional)
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/Gemini_Generated_Image_dl8fxydl8fxydl8f.png"
  min_sdk_android: 21
  adaptive_icon_background: "#EAF6FB"
  adaptive_icon_foreground: "assets/icons/Gemini_Generated_Image_dl8fxydl8fxydl8f.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/
